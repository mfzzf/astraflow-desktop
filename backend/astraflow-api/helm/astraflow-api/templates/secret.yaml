{{- if not .Values.database.existingConfigSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "astraflow-api.configSecretName" . }}
  labels:
    {{- include "astraflow-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
    server:
      http:
        addr: {{ .Values.server.http.addr | quote }}
        timeout: {{ .Values.server.http.timeout | quote }}
      grpc:
        addr: {{ .Values.server.grpc.addr | quote }}
        timeout: {{ .Values.server.grpc.timeout | quote }}
    data:
      database:
        driver: {{ .Values.database.driver | quote }}
        source: {{ required "database.source is required unless database.existingConfigSecret is set" .Values.database.source | quote }}
      redis:
        addr: {{ .Values.redis.addr | quote }}
        read_timeout: {{ .Values.redis.readTimeout | quote }}
        write_timeout: {{ .Values.redis.writeTimeout | quote }}
      inference:
        addr: {{ .Values.inference.addr | quote }}
        timeout: {{ .Values.inference.timeout | quote }}
        max_message_bytes: {{ .Values.inference.maxMessageBytes }}
{{- end }}
