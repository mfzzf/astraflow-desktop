---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.gpuInference.gateway.name }}
  labels:
    {{- include "astraflow-api.inferenceLabels" . | nindent 4 }}
    app: {{ .Values.gpuInference.gateway.name }}
spec:
  replicas: {{ .Values.gpuInference.gateway.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.gpuInference.gateway.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.gpuInference.gateway.name }}
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: [/app/inference-gateway]
          env:
            - name: ASR_BASE_URL
              value: {{ .Values.gpuInference.gateway.asrBaseURL | quote }}
            - name: TITLE_BASE_URL
              value: {{ .Values.gpuInference.gateway.titleBaseURL | quote }}
            - name: ASR_MODEL
              value: {{ .Values.gpuInference.models.asr.servedModelName | quote }}
            - name: TITLE_MODEL
              value: {{ .Values.gpuInference.models.title.servedModelName | quote }}
            {{- with .Values.gpuInference.gateway.audioURIAllowedHostSuffixes }}
            - name: AUDIO_URI_ALLOWED_HOST_SUFFIXES
              value: {{ . | quote }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.gpuInference.gateway.port }}
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.gpuInference.gateway.resources | nindent 12 }}
{{- end }}
