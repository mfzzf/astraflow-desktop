{{- if .Values.gpuInference.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.gpuInference.models.asr.name }}
  labels:
    {{- include "astraflow-api.inferenceLabels" . | nindent 4 }}
    app: {{ .Values.gpuInference.models.asr.name }}
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.gpuInference.models.asr.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.gpuInference.models.asr.name }}
        astraflow.ai/gpu-inference: "true"
    spec:
      {{- with .Values.gpuInference.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  astraflow.ai/gpu-inference: "true"
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: stage-model
          image: "{{ .Values.gpuInference.models.image.repository }}:{{ .Values.gpuInference.models.image.tag }}"
          imagePullPolicy: {{ .Values.gpuInference.models.image.pullPolicy }}
          command: [/bin/bash, -ec]
          args:
            - |
              test -f /models-us3/Qwen3-ASR-1.7B/config.json
              cp -a /models-us3/Qwen3-ASR-1.7B /models-local/
          resources:
            {{- toYaml .Values.gpuInference.staging.resources | nindent 12 }}
          volumeMounts:
            - name: models-us3
              mountPath: /models-us3
              readOnly: true
            - name: models-local
              mountPath: /models-local
      containers:
        - name: model
          image: "{{ .Values.gpuInference.models.image.repository }}:{{ .Values.gpuInference.models.image.tag }}"
          imagePullPolicy: {{ .Values.gpuInference.models.image.pullPolicy }}
          env:
            - name: MODEL_ROLE
              value: asr
            - name: ASR_MODEL
              value: {{ .Values.gpuInference.models.asr.modelPath | quote }}
            - name: ASR_SERVED_MODEL_NAME
              value: {{ .Values.gpuInference.models.asr.servedModelName | quote }}
            - name: ASR_GPU_MEMORY_UTILIZATION
              value: {{ .Values.gpuInference.models.asr.gpuMemoryUtilization | quote }}
            - name: ASR_MAX_NUM_SEQS
              value: {{ .Values.gpuInference.models.asr.maxNumSeqs | quote }}
          ports:
            - name: http
              containerPort: 8001
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 180
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.gpuInference.models.resources | nindent 12 }}
          volumeMounts:
            - name: models-us3
              mountPath: /models-us3
              readOnly: true
            - name: models-local
              mountPath: /models-local
      volumes:
        - name: models-us3
          persistentVolumeClaim:
            claimName: {{ .Values.gpuInference.storage.pvcName }}
            readOnly: true
        - name: models-local
          emptyDir:
            sizeLimit: {{ .Values.gpuInference.staging.localSizeLimit }}
      {{- with .Values.gpuInference.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gpuInference.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
