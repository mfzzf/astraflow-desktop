replicaCount: 1

image:
  repository: uhub.service.ucloud.cn/uminfer-proxy/astraflow-api
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

ports:
  http: 8000
  grpc: 9000

service:
  create: false
  type: LoadBalancer
  resourcePolicy: keep
  annotations:
    service.beta.kubernetes.io/ucloud-load-balancer-type: outer
    service.beta.kubernetes.io/ucloud-load-balancer-listentype: network
    service.beta.kubernetes.io/ucloud-load-balancer-vserver-protocol: tcp
    service.beta.kubernetes.io/ucloud-load-balancer-vserver-method: roundrobin
    service.beta.kubernetes.io/ucloud-load-balancer-vserver-monitor-type: port
    service.beta.kubernetes.io/ucloud-load-balancer-paymode: dynamic
    service.beta.kubernetes.io/ucloud-load-balancer-eip-paymode: traffic
    service.beta.kubernetes.io/ucloud-load-balancer-eip-bandwidth: "300"
    service.beta.kubernetes.io/ucloud-load-balancer-eip-chargetype: dynamic

server:
  http:
    addr: 0.0.0.0:8000
    timeout: 15s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 15s

database:
  driver: postgres
  source: ""
  existingConfigSecret: ""

redis:
  addr: 127.0.0.1:6379
  readTimeout: 0.2s
  writeTimeout: 0.2s

ucloud:
  apiEndpoint: https://api.ucloud.cn/
  oauthAuthorizationEndpoint: https://oauth2.ucloud.cn/authorize
  oauthTokenEndpoint: https://oauth2.ucloud.cn/token
  oauthScopes: "openid email offline_access full_access"
  oauthRedirectUris: "astraflow://oauth/callback https://astraflow-desktop.modelverse.cn/mobile/oauth/callback"

objectStorage:
  # S3-compatible, path-style endpoint. Production endpoints must use HTTPS.
  endpoint: ""
  bucket: ""
  region: "cn-bj2"
  publicApiBaseUrl: "https://astraflow-desktop.modelverse.cn/astraflow-desktop/api"

push:
  expoEndpoint: "https://exp.host/--/api/v2/push/send"

cloudWorker:
  enabled: false
  replicaCount: 1
  apiBaseUrl: "https://astraflow-desktop.modelverse.cn/astraflow-desktop/api"
  image:
    repository: uhub.service.ucloud.cn/uminfer-proxy/astraflow-cloud-worker
    pullPolicy: Always
    tag: "latest"
  sandboxTemplate: ""
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

admin:
  # Existing Secret containing ASTRAFLOW_ADMIN_API_KEY and
  # ASTRAFLOW_CHANNEL_SECRET_KEY, ASTRAFLOW_PUSH_TOKEN_SECRET_KEY,
  # ASTRAFLOW_UCLOUD_OAUTH_CLIENT_ID, and
  # ASTRAFLOW_UCLOUD_OAUTH_CLIENT_SECRET,
  # ASTRAFLOW_OBJECT_STORAGE_ACCESS_KEY,
  # ASTRAFLOW_OBJECT_STORAGE_SECRET_KEY, optional
  # ASTRAFLOW_OBJECT_STORAGE_SESSION_TOKEN,
  # ASTRAFLOW_CLOUD_WORKER_TOKEN, ASTRAFLOW_CLOUD_SANDBOX_API_KEY, and
  # ASTRAFLOW_CLOUD_MODELVERSE_API_KEY.
  # Keep secret material out of Helm values.
  existingSecret: ""

resources: {}

livenessProbe:
  httpGet:
    path: /v1/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
