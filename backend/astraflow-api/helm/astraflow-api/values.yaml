replicaCount: 1

image:
  repository: uhub.service.ucloud.cn/uminfer-proxy/astraflow-api
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

ports:
  http: 8000
  grpc: 9000

service:
  create: false
  type: LoadBalancer
  resourcePolicy: keep
  annotations:
    service.beta.kubernetes.io/ucloud-load-balancer-type: outer
    service.beta.kubernetes.io/ucloud-load-balancer-listentype: network
    service.beta.kubernetes.io/ucloud-load-balancer-vserver-protocol: tcp
    service.beta.kubernetes.io/ucloud-load-balancer-vserver-method: roundrobin
    service.beta.kubernetes.io/ucloud-load-balancer-vserver-monitor-type: port
    service.beta.kubernetes.io/ucloud-load-balancer-paymode: dynamic
    service.beta.kubernetes.io/ucloud-load-balancer-eip-paymode: traffic
    service.beta.kubernetes.io/ucloud-load-balancer-eip-bandwidth: "300"
    service.beta.kubernetes.io/ucloud-load-balancer-eip-chargetype: dynamic

server:
  http:
    addr: 0.0.0.0:8000
    timeout: 300s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 300s

database:
  driver: postgres
  source: ""
  existingConfigSecret: ""

redis:
  addr: 127.0.0.1:6379
  readTimeout: 0.2s
  writeTimeout: 0.2s

inference:
  addr: astraflow-inference-gateway:9100
  timeout: 300s
  maxMessageBytes: 67108864

gpuInference:
  enabled: false
  name: astraflow-inference
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  models:
    image:
      repository: uhub.service.ucloud.cn/uminfer-proxy/astraflow-models
      tag: qwen3-asr-1.7b-qwen3-8b-awq
      pullPolicy: Always
    asrModelPath: /models-local/Qwen3-ASR-1.7B
    titleModelPath: /models-local/Qwen3-8B-AWQ
    asrGpuMemoryUtilization: "0.28"
    titleGpuMemoryUtilization: "0.55"
    titleMaxModelLen: "8192"
    resources:
      requests:
        cpu: "6"
        memory: 12Gi
        ephemeral-storage: 20Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "16"
        memory: 48Gi
        ephemeral-storage: 30Gi
        nvidia.com/gpu: "1"
  gateway:
    port: 9100
    asrBaseURL: http://127.0.0.1:8001
    titleBaseURL: http://127.0.0.1:8002
    audioURIAllowedHostSuffixes: ""
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
  staging:
    localSizeLimit: 30Gi
    resources:
      requests:
        cpu: "2"
        memory: 4Gi
        ephemeral-storage: 20Gi
      limits:
        cpu: "4"
        memory: 8Gi
        ephemeral-storage: 30Gi
  storage:
    enabled: true
    createStorageClass: true
    storageClassName: astraflow-models-us3
    createPVC: true
    pvcName: astraflow-models-us3
    pvcSize: 10Gi
    bucket: astraflow-models
    path: /
    reclaimPolicy: Retain
    secret:
      name: astraflow-models-us3-secret

ucloud:
  apiEndpoint: https://api.ucloud.cn/

admin:
  # Existing Secret containing ASTRAFLOW_ADMIN_API_KEY and
  # ASTRAFLOW_CHANNEL_SECRET_KEY. Keep secret material out of Helm values.
  existingSecret: ""

resources: {}

livenessProbe:
  httpGet:
    path: /v1/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
