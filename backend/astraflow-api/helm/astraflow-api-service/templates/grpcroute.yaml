{{- if .Values.grpcRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: {{ include "astraflow-api-service.fullname" . }}
  labels:
    {{- include "astraflow-api-service.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.grpcRoute.gateway.name }}
      namespace: {{ .Values.grpcRoute.gateway.namespace }}
      sectionName: {{ .Values.grpcRoute.gateway.sectionName }}
  hostnames:
    - {{ .Values.grpcRoute.hostname | quote }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ include "astraflow-api-service.fullname" . }}
          port: {{ .Values.ports.grpc }}
          weight: 1
{{- end }}
