server:
  http:
    addr: 0.0.0.0:8000
    timeout: 15s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 15s
data:
  database:
    driver: postgres
    source: postgres://astraflow:astraflow@127.0.0.1:5432/astraflow?sslmode=disable
  redis:
    addr: 127.0.0.1:6379
    read_timeout: 0.2s
    write_timeout: 0.2s
