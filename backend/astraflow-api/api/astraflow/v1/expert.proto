syntax = "proto3";

package astraflow.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "astraflow-api/api/astraflow/v1;v1";
option java_multiple_files = true;
option java_package = "com.ucloud.astraflow.v1";
option objc_class_prefix = "AFA";

service ExpertService {
  rpc ListExpertCategories(ListExpertCategoriesRequest) returns (ListExpertCategoriesResponse) {
    option (google.api.http) = {
      get: "/v1/expert-categories"
    };
  }

  rpc ListExperts(ListExpertsRequest) returns (ListExpertsResponse) {
    option (google.api.http) = {
      get: "/v1/experts"
    };
  }

  rpc GetExpert(GetExpertRequest) returns (GetExpertResponse) {
    option (google.api.http) = {
      get: "/v1/experts/{expert_id}"
    };
  }

  rpc GetExpertRuntime(GetExpertRuntimeRequest) returns (GetExpertRuntimeResponse) {
    option (google.api.http) = {
      get: "/v1/experts/{expert_id}/runtime"
    };
  }
}

message ListExpertCategoriesRequest {
  string locale = 1;
}

message ListExpertCategoriesResponse {
  repeated ExpertCategory categories = 1;
  string catalog_version = 2;
  string catalog_hash = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message ListExpertsRequest {
  int32 page_size = 1;
  string page_token = 2;
  string category_id = 3;
  string type = 4;
  string status = 5;
  string query = 6;
  string order_by = 7;
  string locale = 8;
}

message ListExpertsResponse {
  repeated ExpertListItem experts = 1;
  string next_page_token = 2;
  int32 total_size = 3;
  string catalog_version = 4;
  string catalog_hash = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message GetExpertRequest {
  string expert_id = 1;
  string locale = 2;
}

message GetExpertResponse {
  ExpertDetail expert = 1;
}

message GetExpertRuntimeRequest {
  string expert_id = 1;
}

message GetExpertRuntimeResponse {
  ExpertRuntime runtime = 1;
}

message LocalizedText {
  string zh = 1;
  string en = 2;
}

message ExpertCategory {
  string id = 1;
  string name_zh = 2;
  string name_en = 3;
  string description_zh = 4;
  string description_en = 5;
  int32 sort_order = 6;
  int32 expert_count = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message ExpertListItem {
  string id = 1;
  string slug = 2;
  string source = 3;
  string source_folder = 4;
  string type = 5;
  string status = 6;
  string category_id = 7;
  string display_name = 8;
  string display_name_zh = 9;
  string display_name_en = 10;
  string profession = 11;
  string profession_zh = 12;
  string profession_en = 13;
  string description = 14;
  string description_zh = 15;
  string description_en = 16;
  string avatar_url = 17;
  repeated string tags = 18;
  repeated string quick_prompts = 19;
  int32 prompt_count = 20;
  int32 skill_count = 21;
  int32 mcp_count = 22;
  int32 member_count = 23;
  string runtime_hash = 24;
  bool runtime_available = 25;
  string unavailable_reason = 26;
  google.protobuf.Timestamp updated_at = 27;
}

message ExpertDetail {
  ExpertListItem summary = 1;
  LocalizedText default_init_prompt = 2;
  repeated ExpertAgent agents = 3;
  repeated ExpertSkill skills = 4;
  repeated ExpertMcpServer mcp_servers = 5;
  repeated ExpertTeamMember team_members = 6;
  string source_plugin = 7;
  string catalog_hash = 8;
}

message ExpertAgent {
  string id = 1;
  string expert_id = 2;
  string agent_name = 3;
  string role = 4;
  string display_name_zh = 5;
  string display_name_en = 6;
  string profession_zh = 7;
  string profession_en = 8;
  string description = 9;
  string prompt_markdown = 10;
  string frontmatter_json = 11;
  repeated string skills = 12;
  int32 max_turns = 13;
  int32 sort_order = 14;
  string content_hash = 15;
}

message ExpertSkill {
  string id = 1;
  string expert_id = 2;
  string skill_slug = 3;
  string relative_path = 4;
  string title = 5;
  string description = 6;
  string skill_markdown = 7;
  string metadata_json = 8;
  string content_hash = 9;
}

message ExpertMcpServer {
  string id = 1;
  string expert_id = 2;
  string relative_path = 3;
  string mcp_json = 4;
  int32 server_count = 5;
  string content_hash = 6;
}

message ExpertTeamMember {
  string id = 1;
  string expert_id = 2;
  string agent_name = 3;
  string role = 4;
  string display_name_zh = 5;
  string display_name_en = 6;
  string profession_zh = 7;
  string profession_en = 8;
  string avatar_path = 9;
  int32 sort_order = 10;
}

message ExpertRuntime {
  ExpertRuntimeSummary expert = 1;
  repeated ExpertAgent agents = 2;
  ExpertTeam team = 3;
  repeated ExpertSkill skills = 4;
  repeated ExpertMcpServer mcp_servers = 5;
  ExpertRuntimePolicy policy = 6;
}

message ExpertRuntimeSummary {
  string id = 1;
  string type = 2;
  string runtime_hash = 3;
  LocalizedText display_name = 4;
  LocalizedText profession = 5;
  LocalizedText default_init_prompt = 6;
}

message ExpertTeam {
  string lead_agent = 1;
  repeated string member_agents = 2;
}

message ExpertRuntimePolicy {
  bool allow_raw_prompt_display = 1;
  string tool_scope = 2;
}
