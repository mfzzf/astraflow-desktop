}

message CreateAgentRunRequest {
  string run_id = 1;
  string session_id = 2;
  string execution_target = 3;
  string target_device_id = 4;
  string workspace_id = 5;
  string runtime_id = 6;
  string model = 7;
  string reasoning_effort = 8;
  string permission_mode = 9;
  string source_device_id = 10;
  string client_mutation_id = 11;
  bool return_artifacts = 12;
  string dispatch_mode = 13;
}

message GetAgentRunRequest {
  string run_id = 1;
}

message ListAgentRunsRequest {
  string session_id = 1;
  string page_token = 2;
  int32 page_size = 3;
  bool active_only = 4;
}

message ListAgentRunsResponse {
  repeated AgentRun runs = 1;
  string next_page_token = 2;
}

message CancelAgentRunRequest {
  string run_id = 1;
  string source_device_id = 2;
  string client_mutation_id = 3;
}

message AgentRunEvent {
  string event_id = 1;
  int64 seq = 2;
  string type = 3;
  google.protobuf.Struct payload = 4;
  string producer_type = 5;
  string producer_id = 6;
  google.protobuf.Timestamp occurred_at = 7;
}

message AppendAgentRunEventsRequest {
  string run_id = 1;
  repeated AgentRunEvent events = 2;
  string run_status = 3;
  string runtime_session_ref = 4;
  string error_code = 5;
  string error_message = 6;
}

message AppendAgentRunEventsResponse {
  int32 accepted_count = 1;
  int64 last_event_seq = 2;
  AgentRun run = 3;
}

message ListAgentRunEventsRequest {
  string run_id = 1;
  int64 after_seq = 2;
  int32 limit = 3;
}

message ListAgentRunEventsResponse {
  repeated AgentRunEvent events = 1;
  int64 last_event_seq = 2;
  bool has_more = 3;
}

message AgentAction {
  string id = 1;
  string run_id = 2;
  int64 event_seq = 3;
  string type = 4;
  string status = 5;
  google.protobuf.Struct request = 6;
  google.protobuf.Struct resolution = 7;
  int64 version = 8;
  google.protobuf.Timestamp expires_at = 9;
  google.protobuf.Timestamp resolved_at = 10;
  google.protobuf.Timestamp created_at = 11;
}

message ResolveAgentActionRequest {
  string run_id = 1;
  string action_id = 2;
  int64 expected_version = 3;
  string resolution = 4;
  google.protobuf.Struct payload = 5;
  string source_device_id = 6;
  string client_mutation_id = 7;
}

message ListAgentActionsRequest {
  string run_id = 1;
  bool pending_only = 2;
}

message ListAgentActionsResponse {
  repeated AgentAction actions = 1;
}

message SyncEventEnvelope {
  int32 schema_version = 1;
  string event_id = 2;
  int64 cursor = 3;
  string aggregate_type = 4;
  string aggregate_id = 5;
  int64 entity_version = 6;
  string event_type = 7;
  google.protobuf.Struct payload = 8;
  google.protobuf.Timestamp occurred_at = 9;
}

message PullSyncEventsRequest {
  int64 after = 1;
  int32 limit = 2;
}

message PullSyncEventsResponse {
  repeated SyncEventEnvelope events = 1;
  int64 next_cursor = 2;
  bool has_more = 3;
  bool resync_required = 4;
}

message GetSyncSnapshotRequest {
  bool include_archived_sessions = 1;
}

message GetSyncSnapshotResponse {
