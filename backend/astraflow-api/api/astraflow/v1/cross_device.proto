  repeated Device devices = 2;
  repeated Workspace workspaces = 3;
  repeated Session sessions = 4;
  repeated AgentRun active_runs = 5;
  repeated AgentAction pending_actions = 6;
  int64 cursor = 7;
  int32 schema_version = 8;
}

message ListModelsRequest {
