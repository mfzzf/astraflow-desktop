  string workspace_id = 2;
  string name = 3;
  string prompt = 4;
  string runtime_id = 5;
  string model = 6;
  string reasoning_effort = 7;
  string permission_mode = 8;
  string schedule_kind = 9;
  string schedule_expression = 10;
  string time_zone = 11;
  bool enabled = 12;
  string source_device_id = 13;
  string client_mutation_id = 14;
}

message SetAutomationEnabledRequest {
  string automation_id = 1;
  int64 expected_version = 2;
  bool enabled = 3;
  string source_device_id = 4;
  string client_mutation_id = 5;
}

message CreateArtifactShareRequest {
  string artifact_id = 1;
  int32 expires_in_seconds = 2;
}

message RevokeArtifactShareRequest {
  string artifact_id = 1;
  string share_id = 2;
}

message GetSharedArtifactRequest {
  string share_token = 1;
}

message SyncMutation {
  string mutation_id = 1;
  string operation = 2;
  google.protobuf.Struct payload = 3;
}

message ApplySyncMutationsRequest {
  string source_device_id = 1;
  repeated SyncMutation mutations = 2;
}

message SyncMutationResult {
  string mutation_id = 1;
  string status = 2;
  string entity_type = 3;
  string entity_id = 4;
  int64 entity_version = 5;
  string error_code = 6;
  string error_message = 7;
}

message ApplySyncMutationsResponse {
  repeated SyncMutationResult results = 1;
}

message ClaimCloudWorkspaceRequest {
  string worker_id = 1;
  int32 lease_seconds = 2;
}

message CloudWorkspaceLease {
