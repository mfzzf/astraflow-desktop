openapi: 3.1.0
x-language: zh-CN
info:
  title: Vidu-Text2Video接口文档
  version: "1.0.0"
  description: |
    这是 ModelVerse 上 `Vidu-Text2Video` 的视频接口文档，说明如何提交生成任务、查询任务状态、读取视频结果以及处理错误。
    接口路径包括 `POST /v1/tasks/submit`、`GET /v1/tasks/status`。
servers:
  - url: https://api.modelverse.cn
    description: 该模型文档中使用的 ModelVerse API 端点。

tags:
  - name: Vidu/Text2Video
    description: Text-to-video asynchronous task operations for Vidu/Text2Video.

paths:
  /v1/tasks/submit:
    post:
      tags:
        - Vidu/Text2Video
      operationId: submitViduText2VideoTask
      summary: 提交 Vidu/Text2Video 文生视频任务
      description: |
        提交异步任务。请求体中的模型和参数按本模型文档填写，响应会返回任务 ID。
      x-astraflow-profile:
        version: 1
        defaultMode: text-to-video
        modes:
          - id: text-to-video
            promptRequired: true
            label:
              zh: 文生视频
              en: Text to video
            description:
              zh: 仅使用提示词生成视频。
              en: Generate a video from the prompt only.
            media: []
        constraints: []
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ViduText2VideoSubmitRequest"
            examples:
              documented:
                summary: 源文档 文生视频 请求
                value:
                  model: viduq2
                  input:
                    prompt: In an ultra-realistic fashion photography style featuring light blue and pale amber tones, an astronaut in a spacesuit walks through the fog. The background consists of enchanting white and golden lights, creating a minimalist still life and an impressive panoramic scene.
                  parameters:
                    vidu_type: text2video
                    duration: 5
                    aspect_ratio: "16:9"
                    resolution: 720p
                    bgm: true
              withOptionalControls:
                summary: 带可选控制参数的文生视频请求
                value:
                  model: viduq2
                  input:
                    prompt: A cinematic wide shot of a glass greenhouse at sunrise, with mist rolling through tropical plants and warm light reflecting from rain on the floor.
                  parameters:
                    vidu_type: text2video
                    duration: 8
                    seed: 12345
                    aspect_ratio: "9:16"
                    resolution: 1080p
                    guidance_scale: 5.5
                    bgm: false
      responses:
        "200":
          description: 任务提交成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViduText2VideoSubmitResponse"
              examples:
                submitted:
                  summary: 已提交任务
                  value:
                    output:
                      task_id: task_id
                    request_id: request_id
        "400":
          description: 请求参数无效。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViduText2VideoErrorResponse"
              examples:
                paramError:
                  $ref: "#/components/examples/ViduText2VideoParamError"
        default:
          description: 错误响应。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViduText2VideoErrorResponse"
              examples:
                error:
                  $ref: "#/components/examples/ViduText2VideoParamError"

  /v1/tasks/status:
    get:
      tags:
        - Vidu/Text2Video
      operationId: getViduText2VideoTaskStatus
      summary: 查询 Vidu/Text2Video 任务状态
      description: |
        查询异步任务状态。任务完成后，响应中会包含结果 URL、用量信息或错误信息。
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: query
          required: true
          description: Asynchronous task identifier returned by `/v1/tasks/submit`.
          schema:
            type: string
          example: task_id
      responses:
        "200":
          description: 任务状态响应。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViduText2VideoStatusResponse"
              examples:
                success:
                  summary: 成功任务
                  value:
                    output:
                      task_id: task_id
                      task_status: Success
                      urls:
                        - https://xxxxx/xxxx.mp4
                      submit_time: 1756959000
                      finish_time: 1756959050
                    usage:
                      duration: 5
                    request_id: ""
                failure:
                  summary: 失败任务
                  value:
                    output:
                      task_id: task_id
                      task_status: Failure
                      submit_time: 1756959000
                      finish_time: 1756959019
                      error_message: error_message
                    usage:
                      duration: 5
                    request_id: ""
        "400":
          description: 任务标识或请求参数无效。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViduText2VideoErrorResponse"
              examples:
                paramError:
                  $ref: "#/components/examples/ViduText2VideoParamError"
        default:
          description: 错误响应。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViduText2VideoErrorResponse"
              examples:
                error:
                  $ref: "#/components/examples/ViduText2VideoParamError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: |
        查询异步任务状态。任务完成后，响应中会包含结果 URL、用量信息或错误信息。
  schemas:
    ViduText2VideoSubmitRequest:
      type: object
      additionalProperties: false
      required:
        - model
        - input
        - parameters
      properties:
        model:
          type: string
          const: viduq2
          description: Model name. This schema is pinned to `viduq2`.
        input:
          $ref: "#/components/schemas/ViduText2VideoInput"
        parameters:
          $ref: "#/components/schemas/ViduText2VideoParameters"

    ViduText2VideoInput:
      type: object
      additionalProperties: false
      required:
        - prompt
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 2000
          description: Text prompt describing the desired generated video.

    ViduText2VideoParameters:
      type: object
      additionalProperties: false
      required:
        - vidu_type
      properties:
        vidu_type:
          type: string
          const: text2video
          description: Vidu API type. This schema is pinned to `text2video`.
        duration:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
          description: Generated video duration in seconds for `viduq2`.
        seed:
          type: integer
          default: 0
          description: Random seed. The default `0` means a random seed is used.
        aspect_ratio:
          type: string
          enum:
            - "16:9"
            - "9:16"
            - "3:4"
            - "4:3"
            - "1:1"
          default: "16:9"
          description: Generated video aspect ratio.
        resolution:
          type: string
          enum:
            - 540p
            - 720p
            - 1080p
          default: 720p
          description: Generated video resolution for `viduq2` durations from 1 to 10 seconds.
        guidance_scale:
          type: number
          format: double
          description: Guidance scale controlling relevance between the generated result and the prompt.
        bgm:
          type: boolean
          default: false
          description: Whether to add background music.

    ViduText2VideoSubmitResponse:
      type: object
      additionalProperties: false
      required:
        - output
        - request_id
      properties:
        output:
          $ref: "#/components/schemas/ViduText2VideoSubmitOutput"
        request_id:
          type: string
          description: 唯一请求标识。

    ViduText2VideoSubmitOutput:
      type: object
      additionalProperties: false
      required:
        - task_id
      properties:
        task_id:
          type: string
          description: 异步任务唯一标识。

    ViduText2VideoStatusResponse:
      type: object
      additionalProperties: false
      required:
        - output
        - request_id
      properties:
        output:
          $ref: "#/components/schemas/ViduText2VideoStatusOutput"
        usage:
          $ref: "#/components/schemas/ViduText2VideoUsage"
        request_id:
          type: string
          description: 唯一请求标识。

    ViduText2VideoStatusOutput:
      type: object
      additionalProperties: false
      required:
        - task_id
        - task_status
      properties:
        task_id:
          type: string
          description: 异步任务唯一标识。
        task_status:
          $ref: "#/components/schemas/ViduText2VideoTaskStatus"
        urls:
          type: array
          description: 视频结果 URL 列表。
          items:
            type: string
            format: uri
        submit_time:
          type: integer
          format: int64
          description: 任务提交时间戳。
        finish_time:
          type: integer
          format: int64
          description: 任务完成时间戳。
        error_message:
          type: string
          description: 任务失败时返回的错误信息。

    ViduText2VideoTaskStatus:
      type: string
      enum:
        - Pending
        - Running
        - Success
        - Failure
      description: |
        查询异步任务状态。任务完成后，响应中会包含结果 URL、用量信息或错误信息。
    ViduText2VideoUsage:
      type: object
      additionalProperties: false
      properties:
        duration:
          type: integer
          description: 视频时长，单位为秒。

    ViduText2VideoErrorResponse:
      type: object
      additionalProperties: true
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ViduText2VideoErrorObject"
        request_id:
          type: string
          description: 唯一请求标识，如可用。

    ViduText2VideoErrorObject:
      type: object
      additionalProperties: true
      required:
        - message
        - type
      properties:
        message:
          type: string
          description: 错误信息。
        type:
          type: string
          description: 错误类型。
        code:
          type:
            - string
            - "null"
          description: 错误码。
        param:
          type:
            - string
            - "null"
          description: 与错误相关的请求参数。

  examples:
    ViduText2VideoParamError:
      summary: 参数错误
      value:
        error:
          message: Invalid param
          type: invalid_request_error
          code: param_error
          param: input.prompt
        request_id: request_id
