name: Agent Runtime Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/agent-runtime-packages.yml"
      - "bun.lock"
      - "package.json"
      - "scripts/agent-runtime-packages.mjs"
      - "scripts/prepare-agent-runtime-installers.mjs"
      - "scripts/smoke-acp.ts"
      - "scripts/smoke-agent-runtime-packages.mjs"

permissions:
  contents: read

env:
  US3_BUCKET: astraflow-desktop
  US3_ENDPOINT: cn-sh2.ufileos.com
  RUNTIME_OBJECT_PREFIX: agent-runtimes/v1

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-26
            artifact_name: agent-runtime-darwin-arm64
          - name: macOS Intel
            os: macos-26-intel
            artifact_name: agent-runtime-darwin-x64
          - name: Windows arm64
            os: windows-11-arm
            artifact_name: agent-runtime-win32-arm64
          - name: Windows x64
            os: windows-2022
            artifact_name: agent-runtime-win32-x64
          - name: Linux arm64
            os: ubuntu-24.04-arm
            artifact_name: agent-runtime-linux-arm64
          - name: Linux x64
            os: ubuntu-24.04
            artifact_name: agent-runtime-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare macOS runtime signing
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_CERTIFICATE_LINK: ${{ secrets.CSC_LINK }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          : "${MACOS_CERTIFICATE_LINK:?Missing CSC_LINK secret}"
          : "${MACOS_CERTIFICATE_PASSWORD:?Missing CSC_KEY_PASSWORD secret}"

          certificate_path="$RUNNER_TEMP/astraflow-runtime-signing.p12"
          keychain_path="$RUNNER_TEMP/astraflow-runtime-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"

          case "$MACOS_CERTIFICATE_LINK" in
            base64:*)
              printf '%s' "${MACOS_CERTIFICATE_LINK#base64:}" | base64 -D > "$certificate_path"
              ;;
            file://*)
              cp "${MACOS_CERTIFICATE_LINK#file://}" "$certificate_path"
              ;;
            http://*|https://*)
              curl -fsSL "$MACOS_CERTIFICATE_LINK" -o "$certificate_path"
              ;;
            *)
              printf '%s' "$MACOS_CERTIFICATE_LINK" | base64 -D > "$certificate_path"
              ;;
          esac

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          keychains=("$keychain_path")
          while IFS= read -r existing_keychain; do
            existing_keychain="${existing_keychain#*\"}"
            existing_keychain="${existing_keychain%\"*}"
            keychains+=("$existing_keychain")
          done < <(security list-keychains -d user)
          security list-keychains -d user -s "${keychains[@]}"

          identity="$(security find-identity -v -p codesigning "$keychain_path" | sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' | head -n 1)"
          : "${identity:?No Developer ID Application identity was imported}"

          rm -f "$certificate_path"
          echo "ASTRAFLOW_RUNTIME_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "ASTRAFLOW_RUNTIME_SIGNING_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"

      - name: Build runtime installers
        run: node scripts/prepare-agent-runtime-installers.mjs

      - name: Start all native ACP runtimes
        run: bun run smoke:agent-runtime-packages

      - name: Upload packaged runtime artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/agent-runtime-installers
          if-no-files-found: error
          retention-days: 3

      - name: Remove macOS runtime signing keychain
        if: always() && runner.os == 'macOS'
        shell: bash
        run: |
          if [ -n "${ASTRAFLOW_RUNTIME_SIGNING_KEYCHAIN:-}" ]; then
            security delete-keychain "$ASTRAFLOW_RUNTIME_SIGNING_KEYCHAIN" >/dev/null 2>&1 || true
            rm -f "$ASTRAFLOW_RUNTIME_SIGNING_KEYCHAIN"
          fi

  publish:
    name: Publish all runtime installers
    needs: package
    runs-on: ubuntu-24.04
    steps:
      - name: Download packaged runtime artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: agent-runtime-*
          path: dist/agent-runtime-installers
          merge-multiple: true

      - name: Install US3 CLI
        run: |
          curl -fsSL https://us3-release.cn-bj.ufileos.com/us3cli/us3cli-linux64 -o us3cli
          sudo install -m 0755 us3cli /usr/local/bin/us3cli
          us3cli --help >/dev/null 2>&1

      - name: Configure US3 CLI
        env:
          US3_ACCESS_KEY: ${{ secrets.US3_ACCESS_KEY || secrets.US3_PUBLIC_KEY }}
          US3_SECRET_KEY: ${{ secrets.US3_SECRET_KEY || secrets.US3_PRIVATE_KEY }}
        run: |
          : "${US3_ACCESS_KEY:?Missing US3_ACCESS_KEY secret}"
          : "${US3_SECRET_KEY:?Missing US3_SECRET_KEY secret}"
          us3cli config astraflow-release \
            --accesskey "$US3_ACCESS_KEY" \
            --secretkey "$US3_SECRET_KEY" \
            --endpoint "$US3_ENDPOINT" \
            --language EN \
            --ssl

      - name: Upload runtime installers to US3
        shell: bash
        run: |
          export US3_BUCKET RUNTIME_OBJECT_PREFIX
          find dist/agent-runtime-installers -type f ! -name runtime-manifest.json -print0 | \
            xargs -0 -n 1 -P 3 bash -c '
              set -euo pipefail
              file="$1"
              relative="${file#dist/agent-runtime-installers/}"
              us3cli cp \
                "$file" \
                "us3://${US3_BUCKET}/${RUNTIME_OBJECT_PREFIX}/${relative}" \
                --config astraflow-release
            ' _

          find dist/agent-runtime-installers -type f -name runtime-manifest.json -print0 | \
            xargs -0 -n 1 -P 3 bash -c '
              set -euo pipefail
              file="$1"
              relative="${file#dist/agent-runtime-installers/}"
              us3cli cp \
                "$file" \
                "us3://${US3_BUCKET}/${RUNTIME_OBJECT_PREFIX}/${relative}" \
                --config astraflow-release
            ' _
