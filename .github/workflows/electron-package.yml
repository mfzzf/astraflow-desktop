name: Electron Package

on:
  workflow_dispatch:
    inputs:
      channel_slug:
        description: Optional managed distribution channel slug
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NEXT_TELEMETRY_DISABLED: "1"
  # workflow_dispatch takes precedence; repository variables can provide the
  # default channel for tag-triggered packages.
  NEXT_PUBLIC_ASTRAFLOW_CHANNEL_SLUG: ${{ inputs.channel_slug || vars.ASTRAFLOW_CHANNEL_SLUG || '' }}
  # Leave headroom for native tooling on the small packaging runner.
  NODE_OPTIONS: --max-old-space-size=1408
  US3_BUCKET: astraflow-desktop
  US3_ENDPOINT: cn-sh2.ufileos.com
  US3_PUBLIC_BASE_URL: https://astraflow-desktop.cn-sh2.ufileos.com
  US3_STAGING_PREFIX: _ci/${{ github.run_id }}/${{ github.run_attempt }}

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-26
            builder_args: --mac dmg zip --arm64
            package_name: astraflow-macos-arm64
          - name: macOS Intel
            os: macos-26-intel
            builder_args: --mac dmg zip --x64
            package_name: astraflow-macos-x64
          - name: Windows x64
            os: windows-2022
            builder_args: --win nsis --x64
            package_name: astraflow-windows-x64
          - name: Windows arm64
            os: windows-11-arm
            builder_args: --win nsis --arm64
            package_name: astraflow-windows-arm64
          - name: Linux x64
            os: ubuntu-24.04
            builder_args: --linux AppImage --x64
            package_name: astraflow-linux-x64
          - name: Linux arm64
            os: ubuntu-24.04-arm
            builder_args: --linux AppImage --arm64
            package_name: astraflow-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux packaging libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libarchive-tools \
            libasound2t64 \
            libcrypt1 \
            libgbm1 \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            rpm \
            xvfb

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare sandbox runtime
        run: bun run runtime:prepare

      - name: Provision Windows sandbox
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $arch = node -p "process.arch"
          $srt = Resolve-Path "runtime/sandbox/win32-$arch/bin/srt-win.exe"
          & $srt install
          if ($LASTEXITCODE -ne 0) {
            throw "srt-win install failed with code $LASTEXITCODE"
          }

      - name: Start all native ACP runtimes
        run: bun run smoke:agent-runtime-packages

      - name: Start sandboxed Claude Code ACP
        # GitHub-hosted Linux blocks bwrap from configuring its isolated
        # loopback interface. Native runtime smoke still runs above; process
        # sandbox integration runs on macOS and Windows.
        if: ${{ !cancelled() && runner.os != 'Linux' }}
        run: bun run smoke:claude-sandbox-acp

      - name: Start sandboxed OpenCode ACP
        if: ${{ !cancelled() && runner.os != 'Linux' }}
        run: bun run smoke:opencode-sandbox-acp

      - name: Build Next.js for Electron
        run: bun run electron:build

      - name: Package Electron app
        run: node scripts/run-electron-builder.mjs ${{ matrix.builder_args }} --publish never
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}

      - name: Verify macOS signing and capabilities
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find dist/electron -type d -name 'AstraFlow.app' -print -quit)"
          test -n "$app_path"

          # Electron 42 uses UNNotification on macOS. Native notifications fail
          # at runtime unless the complete application bundle is code-signed.
          codesign --verify --deep --strict --verbose=2 "$app_path"
          signing_details="$(codesign -dvvv "$app_path" 2>&1)"
          grep -q "Authority=Developer ID Application:" <<<"$signing_details"
          grep -Eq "TeamIdentifier=[A-Z0-9]{10}" <<<"$signing_details"

          main_entitlements="$(mktemp)"
          helper_entitlements="$(mktemp)"
          trap 'rm -f "$main_entitlements" "$helper_entitlements"' EXIT

          codesign -d --entitlements "$main_entitlements" --xml "$app_path"
          /usr/libexec/PlistBuddy -c "Print :com.apple.security.device.audio-input" "$main_entitlements" | grep -qx true
          plutil -extract NSMicrophoneUsageDescription raw -o - "$app_path/Contents/Info.plist" | grep -q .

          helper_path="$app_path/Contents/Frameworks/AstraFlow Helper (Renderer).app"
          codesign -d --entitlements "$helper_entitlements" --xml "$helper_path"
          /usr/libexec/PlistBuddy -c "Print :com.apple.security.device.audio-input" "$helper_entitlements" | grep -qx true

      - name: Verify Windows code signature
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installers = @(Get-ChildItem -Path "dist/electron" -Filter "*.exe" -File)
          $fallbackSignerPattern = "UCloud Technology Co\., Ltd\."
          $chainErrorPattern = "certificate chain could not be built to a trusted root authority|0x800B010A|CERT_E_CHAINING"

          if ($installers.Count -eq 0) {
            throw "No Windows installers found."
          }

          foreach ($installer in $installers) {
            $signature = Get-AuthenticodeSignature -LiteralPath $installer.FullName

            if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::Valid) {
              $statusMessage = [string]$signature.StatusMessage
              $subject = [string]$signature.SignerCertificate.Subject
              $hasRecoverableChainError = $statusMessage -match $chainErrorPattern
              $hasExpectedSigner = $subject -match $fallbackSignerPattern

              if ($hasRecoverableChainError -and $hasExpectedSigner) {
                Write-Warning "Accepted $($installer.Name) with recoverable Windows chain error for signer $($signature.SignerCertificate.Thumbprint)."
                continue
              }

              $signature | Format-List * | Out-String | Write-Host
              throw "Invalid Authenticode signature for $($installer.Name): $statusMessage"
            }
          }

      - name: Smoke packaged Electron runtime
        if: runner.os != 'Linux'
        run: bun run electron:smoke

      - name: Smoke packaged Electron runtime on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a bun run electron:smoke

      - name: Upload packaged Electron artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package_name }}
          path: |
            dist/electron/*.AppImage
            dist/electron/*.blockmap
            dist/electron/*.dmg
            dist/electron/*.exe
            dist/electron/*.zip
            dist/electron/latest*.yml
          if-no-files-found: error
          retention-days: 3

  publish-assets:
    name: Publish all package assets
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Download packaged Electron artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: astraflow-*
          path: dist/release-packages

      - name: Install US3 CLI
        run: |
          curl -fsSL https://us3-release.cn-bj.ufileos.com/us3cli/us3cli-linux64 -o us3cli
          sudo install -m 0755 us3cli /usr/local/bin/us3cli
          us3cli --help >/dev/null 2>&1

      - name: Configure US3 CLI
        env:
          US3_ACCESS_KEY: ${{ secrets.US3_ACCESS_KEY || secrets.US3_PUBLIC_KEY }}
          US3_SECRET_KEY: ${{ secrets.US3_SECRET_KEY || secrets.US3_PRIVATE_KEY }}
        run: |
          : "${US3_ACCESS_KEY:?Missing US3_ACCESS_KEY secret}"
          : "${US3_SECRET_KEY:?Missing US3_SECRET_KEY secret}"
          us3cli config astraflow-release \
            --accesskey "$US3_ACCESS_KEY" \
            --secretkey "$US3_SECRET_KEY" \
            --endpoint "$US3_ENDPOINT" \
            --language EN \
            --ssl

      - name: Publish package assets and stage update metadata
        shell: bash
        run: |
          package_count=0
          asset_count=0
          manifest_count=0

          while IFS= read -r -d '' package_dir; do
            package_count=$((package_count + 1))
            package_assets="$(find "$package_dir" -maxdepth 1 -type f ! -name 'latest*.yml' | wc -l | tr -d ' ')"
            package_manifests="$(find "$package_dir" -maxdepth 1 -type f -name 'latest*.yml' | wc -l | tr -d ' ')"

            if [ "$package_assets" -eq 0 ] || [ "$package_manifests" -ne 1 ]; then
              echo "Incomplete Electron package artifact: $package_dir ($package_assets assets, $package_manifests manifests)." >&2
              exit 1
            fi
          done < <(find dist/release-packages -mindepth 1 -maxdepth 1 -type d -print0)

          if [ "$package_count" -ne 6 ]; then
            echo "Expected 6 Electron package artifacts, found $package_count." >&2
            exit 1
          fi

          while IFS= read -r -d '' file; do
            relative="${file#dist/release-packages/}"
            package_name="${relative%%/*}"
            basename="$(basename "$file")"

            case "$basename" in
              latest*.yml)
                key="$US3_STAGING_PREFIX/$package_name/$basename"
                manifest_count=$((manifest_count + 1))
                ;;
              *)
                key="$basename"
                asset_count=$((asset_count + 1))
                ;;
            esac

            us3cli cp "$file" "us3://${US3_BUCKET}/${key}" --config astraflow-release
          done < <(find dist/release-packages -mindepth 2 -type f -print0)

          if [ "$asset_count" -eq 0 ]; then
            echo "No packaged Electron assets found." >&2
            exit 1
          fi

          if [ "$manifest_count" -ne 6 ]; then
            echo "Expected 6 Electron update manifests, found $manifest_count." >&2
            exit 1
          fi

  sandbox-template:
    name: Build astraflow-code Sandbox template
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sandbox_template/code/requirements.txt

      - name: Install Sandbox template dependencies
        run: python -m pip install --requirement sandbox_template/code/requirements.txt

      - name: Build astraflow-code from this release commit
        working-directory: sandbox_template/code
        run: |
          : "${UCLOUD_SANDBOX_API_KEY:?Missing UCLOUD_SANDBOX_API_KEY secret}"
          python build_template.py
        env:
          UCLOUD_SANDBOX_API_KEY: ${{ secrets.UCLOUD_SANDBOX_API_KEY }}
          UCLOUD_SANDBOX_DOMAIN: cn-wlcb.sandbox.ucloudai.com
          UCLOUD_SANDBOX_TEMPLATE_CPU_COUNT: "8"
          UCLOUD_SANDBOX_TEMPLATE_MEMORY_MB: "8192"

  release:
    name: Publish release
    needs:
      - publish-assets
      - sandbox-template
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install US3 CLI
        run: |
          curl -fsSL https://us3-release.cn-bj.ufileos.com/us3cli/us3cli-linux64 -o us3cli
          sudo install -m 0755 us3cli /usr/local/bin/us3cli
          us3cli --help >/dev/null 2>&1

      - name: Configure US3 CLI
        run: |
          : "${US3_ACCESS_KEY:?Missing US3_ACCESS_KEY secret}"
          : "${US3_SECRET_KEY:?Missing US3_SECRET_KEY secret}"
          us3cli config astraflow-release \
            --accesskey "$US3_ACCESS_KEY" \
            --secretkey "$US3_SECRET_KEY" \
            --endpoint "$US3_ENDPOINT" \
            --language EN \
            --ssl
        env:
          US3_ACCESS_KEY: ${{ secrets.US3_ACCESS_KEY || secrets.US3_PUBLIC_KEY }}
          US3_SECRET_KEY: ${{ secrets.US3_SECRET_KEY || secrets.US3_PRIVATE_KEY }}

      - name: Download staged update metadata from US3
        run: |
          mkdir -p dist/release
          us3cli cp \
            "us3://${US3_BUCKET}/${US3_STAGING_PREFIX}/" \
            dist/release \
            --recursive \
            --config astraflow-release

      - name: Stage release manifests
        run: node scripts/stage-electron-release-assets.mjs dist/release dist/publish
        env:
          ASTRAFLOW_RELEASE_BASE_URL: ${{ env.US3_PUBLIC_BASE_URL }}

      - name: Publish US3 release manifests
        shell: bash
        run: |
          upload_files() {
            local label="$1"
            shift

            if [ "$#" -eq 0 ]; then
              echo "No $label files to upload."
              return 0
            fi

            echo "Uploading $# $label files with concurrency ${US3_UPLOAD_CONCURRENCY:-4}."
            printf '%s\0' "$@" | xargs -0 -n 1 -P "${US3_UPLOAD_CONCURRENCY:-4}" bash -c '
              set -euo pipefail
              file="$1"
              key="${file#dist/publish/}"
              us3cli cp "$file" "us3://${US3_BUCKET}/${key}" --config astraflow-release
            ' _
          }

          platform_manifest_files=()
          release_manifest_file=""

          while IFS= read -r -d '' file; do
            case "$(basename "$file")" in
              latest.json) release_manifest_file="$file" ;;
              latest*.yml) platform_manifest_files+=("$file") ;;
              *)
                echo "Unexpected release asset queued for a second upload: $file" >&2
                exit 1
                ;;
            esac
          done < <(find dist/publish -type f -print0 | sort -z)

          if [ -z "$release_manifest_file" ]; then
            echo "Missing latest.json release manifest." >&2
            exit 1
          fi

          upload_files "platform update manifest" "${platform_manifest_files[@]}"
          upload_files "release manifest" "$release_manifest_file"
        env:
          US3_UPLOAD_CONCURRENCY: "4"

      - name: Verify US3 update manifest
        run: |
          for attempt in 1 2 3 4 5; do
            node - <<'NODE' && exit 0
            const response = await fetch(`${process.env.US3_PUBLIC_BASE_URL}/latest.json`, {
              cache: "no-store",
            })

            if (!response.ok) {
              throw new Error(`latest.json returned HTTP ${response.status}`)
            }

            const manifest = await response.json()
            const expectedVersion = process.env.TAG_NAME.replace(/^v/i, "")

            if (manifest.version !== expectedVersion) {
              throw new Error(
                `latest.json version ${manifest.version} did not match ${expectedVersion}`
              )
            }
          NODE

            sleep $((attempt * 2))
          done

          exit 1
        env:
          TAG_NAME: ${{ github.ref_name }}

      - name: Remove staged update metadata
        run: |
          us3cli rm \
            "us3://${US3_BUCKET}/${US3_STAGING_PREFIX}/" \
            --recursive \
            --force \
            --config astraflow-release
