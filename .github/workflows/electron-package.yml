name: Electron Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NEXT_TELEMETRY_DISABLED: "1"
  US3_BUCKET: astraflow-desktop
  US3_ENDPOINT: cn-sh2.ufileos.com
  US3_PUBLIC_BASE_URL: https://astraflow-desktop.cn-sh2.ufileos.com

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

  package:
    name: Package ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-26
            builder_args: --mac dmg zip --arm64
            artifact_name: astraflow-macos-arm64
          - name: macOS Intel
            os: macos-26-intel
            builder_args: --mac dmg zip --x64
            artifact_name: astraflow-macos-x64
          - name: Windows x64
            os: windows-2022
            builder_args: --win nsis --x64
            artifact_name: astraflow-windows-x64
          - name: Linux x64
            os: ubuntu-24.04
            builder_args: --linux AppImage --x64
            artifact_name: astraflow-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux packaging libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libarchive-tools \
            libasound2t64 \
            libcrypt1 \
            libgbm1 \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            rpm \
            xvfb

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Next.js for Electron
        run: bun run electron:build

      - name: Package Electron app
        run: node scripts/run-electron-builder.mjs ${{ matrix.builder_args }} --publish never
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}

      - name: Smoke test packaged app
        if: runner.os != 'Linux'
        run: bun run electron:smoke

      - name: Verify Windows code signature
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installers = @(Get-ChildItem -Path "dist/electron" -Filter "*.exe" -File)
          $fallbackSignerPattern = "UCloud Technology Co\., Ltd\."
          $chainErrorPattern = "certificate chain could not be built to a trusted root authority|0x800B010A|CERT_E_CHAINING"

          if ($installers.Count -eq 0) {
            throw "No Windows installers found."
          }

          foreach ($installer in $installers) {
            $signature = Get-AuthenticodeSignature -LiteralPath $installer.FullName

            if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::Valid) {
              $statusMessage = [string]$signature.StatusMessage
              $subject = [string]$signature.SignerCertificate.Subject
              $hasRecoverableChainError = $statusMessage -match $chainErrorPattern
              $hasExpectedSigner = $subject -match $fallbackSignerPattern

              if ($hasRecoverableChainError -and $hasExpectedSigner) {
                Write-Warning "Accepted $($installer.Name) with recoverable Windows chain error for signer $($signature.SignerCertificate.Thumbprint)."
                continue
              }

              $signature | Format-List * | Out-String | Write-Host
              throw "Invalid Authenticode signature for $($installer.Name): $statusMessage"
            }
          }

      - name: Smoke test packaged app
        if: runner.os == 'Linux'
        run: xvfb-run -a bun run electron:smoke

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 9
          path: |
            dist/electron/*.AppImage
            dist/electron/*.blockmap
            dist/electron/*.dmg
            dist/electron/*.exe
            dist/electron/*.zip
            dist/electron/latest*.yml

  release:
    name: Publish release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download package artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist/release

      - name: Stage release assets
        run: node scripts/stage-electron-release-assets.mjs dist/release dist/publish
        env:
          ASTRAFLOW_RELEASE_BASE_URL: ${{ env.US3_PUBLIC_BASE_URL }}

      - name: Install US3 CLI
        run: |
          curl -fsSL https://us3-release.cn-bj.ufileos.com/us3cli/us3cli-linux64 -o us3cli
          sudo install -m 0755 us3cli /usr/local/bin/us3cli
          us3cli --help >/dev/null 2>&1

      - name: Configure US3 CLI
        run: |
          : "${US3_ACCESS_KEY:?Missing US3_ACCESS_KEY secret}"
          : "${US3_SECRET_KEY:?Missing US3_SECRET_KEY secret}"
          us3cli config astraflow-release \
            --accesskey "$US3_ACCESS_KEY" \
            --secretkey "$US3_SECRET_KEY" \
            --endpoint "$US3_ENDPOINT" \
            --language EN \
            --ssl
        env:
          US3_ACCESS_KEY: ${{ secrets.US3_ACCESS_KEY || secrets.US3_PUBLIC_KEY }}
          US3_SECRET_KEY: ${{ secrets.US3_SECRET_KEY || secrets.US3_PRIVATE_KEY }}

      - name: Publish US3 release assets
        shell: bash
        run: |
          upload_files() {
            local label="$1"
            shift

            if [ "$#" -eq 0 ]; then
              echo "No $label files to upload."
              return 0
            fi

            echo "Uploading $# $label files with concurrency ${US3_UPLOAD_CONCURRENCY:-4}."
            printf '%s\0' "$@" | xargs -0 -n 1 -P "${US3_UPLOAD_CONCURRENCY:-4}" bash -c '
              set -euo pipefail
              file="$1"
              key="${file#dist/publish/}"
              us3cli cp "$file" "us3://${US3_BUCKET}/${key}" --config astraflow-release
            ' _
          }

          asset_files=()
          manifest_files=()

          while IFS= read -r -d '' file; do
            case "$(basename "$file")" in
              latest*.yml|latest.json) manifest_files+=("$file") ;;
              *) asset_files+=("$file") ;;
            esac
          done < <(find dist/publish -type f -print0 | sort -z)

          upload_files "release asset" "${asset_files[@]}"
          upload_files "update manifest" "${manifest_files[@]}"
        env:
          US3_UPLOAD_CONCURRENCY: "4"

      - name: Verify US3 update manifest
        run: |
          for attempt in 1 2 3 4 5; do
            node - <<'NODE' && exit 0
            const response = await fetch(`${process.env.US3_PUBLIC_BASE_URL}/latest.json`, {
              cache: "no-store",
            })

            if (!response.ok) {
              throw new Error(`latest.json returned HTTP ${response.status}`)
            }

            const manifest = await response.json()
            const expectedVersion = process.env.TAG_NAME.replace(/^v/i, "")

            if (manifest.version !== expectedVersion) {
              throw new Error(
                `latest.json version ${manifest.version} did not match ${expectedVersion}`
              )
            }
          NODE

            sleep $((attempt * 2))
          done

          exit 1
        env:
          TAG_NAME: ${{ github.ref_name }}
