name: Electron Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

  package:
    name: Package ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-26
            builder_args: --mac dmg --arm64
            artifact_name: astraflow-macos-arm64
          - name: macOS Intel
            os: macos-26-intel
            builder_args: --mac dmg --x64
            artifact_name: astraflow-macos-x64
          - name: Windows x64
            os: windows-2022
            builder_args: --win nsis --x64
            artifact_name: astraflow-windows-x64
          - name: Linux x64
            os: ubuntu-24.04
            builder_args: --linux AppImage --x64
            artifact_name: astraflow-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux packaging libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libarchive-tools \
            libasound2t64 \
            libcrypt1 \
            libgbm1 \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            rpm \
            xvfb

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Next.js for Electron
        run: bun run electron:build

      - name: Package Electron app
        run: node scripts/run-electron-builder.mjs ${{ matrix.builder_args }} --publish never
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}

      - name: Smoke test packaged app
        if: runner.os != 'Linux'
        run: bun run electron:smoke

      - name: Smoke test packaged app
        if: runner.os == 'Linux'
        run: xvfb-run -a bun run electron:smoke

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          compression-level: 9
          path: |
            dist/electron/*.AppImage
            dist/electron/*.blockmap
            dist/electron/*.dmg
            dist/electron/*.exe
            dist/electron/latest*.yml

  release:
    name: Publish release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download package artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist/release

      - name: Stage release assets
        run: node scripts/stage-electron-release-assets.mjs dist/release dist/publish

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "AstraFlow $TAG_NAME"
          gh release upload "$TAG_NAME" dist/publish/* --clobber
