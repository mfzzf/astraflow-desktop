name: Electron Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

  package:
    name: Package ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-26
            builder_args: --mac dmg zip --arm64
            artifact_name: astraflow-macos-arm64
          - name: macOS Intel
            os: macos-26-intel
            builder_args: --mac dmg zip --x64
            artifact_name: astraflow-macos-x64
          - name: Windows x64
            os: windows-2022
            builder_args: --win nsis zip --x64
            artifact_name: astraflow-windows-x64
          - name: Linux x64
            os: ubuntu-24.04
            builder_args: --linux AppImage deb tar.gz --x64
            artifact_name: astraflow-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux packaging libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libarchive-tools \
            libasound2t64 \
            libcrypt1 \
            libgbm1 \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            rpm \
            xvfb

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Next.js for Electron
        run: bun run electron:build

      - name: Package Electron app
        run: node scripts/run-electron-builder.mjs ${{ matrix.builder_args }} --publish never

      - name: Smoke test packaged app
        if: runner.os != 'Linux'
        run: bun run electron:smoke

      - name: Smoke test packaged app
        if: runner.os == 'Linux'
        run: xvfb-run -a bun run electron:smoke

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            dist/electron/*.AppImage
            dist/electron/*.blockmap
            dist/electron/*.deb
            dist/electron/*.dmg
            dist/electron/*.exe
            dist/electron/*.tar.gz
            dist/electron/*.yml
            dist/electron/*.zip
