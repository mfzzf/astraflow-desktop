apiVersion: v1
kind: Namespace
metadata:
  name: astraflow-landing
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: astraflow-landing-page
  namespace: astraflow-landing
  labels:
    app.kubernetes.io/name: astraflow-landing-page
    app.kubernetes.io/part-of: astraflow
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: astraflow-landing-page
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astraflow-landing-page
        app.kubernetes.io/part-of: astraflow
    spec:
      imagePullSecrets:
        - name: uhub-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: landing-page
          image: uhub.service.ucloud.cn/astraflow-desktop/landing-page:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      terminationGracePeriodSeconds: 10
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: astraflow-landing-page
  namespace: astraflow-landing
  labels:
    app.kubernetes.io/name: astraflow-landing-page
    app.kubernetes.io/part-of: astraflow
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: astraflow-landing-page
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: astraflow-landing-page
  namespace: astraflow-landing
  labels:
    app.kubernetes.io/name: astraflow-landing-page
    app.kubernetes.io/part-of: astraflow
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public-gateway
      namespace: gateway-infra
      sectionName: http
  hostnames:
    - astraflow-desktop.modelverse.cn
  rules:
    - matches:
        - path:
            type: Exact
            value: /download
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /download/
            statusCode: 301
    - matches:
        - path:
            type: PathPrefix
            value: /download/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: astraflow-landing-page
          port: 80
          weight: 1
