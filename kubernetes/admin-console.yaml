apiVersion: v1
kind: Namespace
metadata:
  name: astraflow-admin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: astraflow-admin-console
  namespace: astraflow-admin
  labels:
    app.kubernetes.io/name: astraflow-admin-console
    app.kubernetes.io/part-of: astraflow
data:
  ASTRAFLOW_API_BASE_URL: http://astraflow-api.astraflow.svc.cluster.local:8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: astraflow-admin-console
  namespace: astraflow-admin
  labels:
    app.kubernetes.io/name: astraflow-admin-console
    app.kubernetes.io/part-of: astraflow
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: astraflow-admin-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astraflow-admin-console
        app.kubernetes.io/part-of: astraflow
    spec:
      imagePullSecrets:
        - name: uhub-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admin-console
          image: uhub.service.ucloud.cn/astraflow-desktop/admin-console:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: ASTRAFLOW_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: astraflow-admin-console
                  key: ASTRAFLOW_API_BASE_URL
            - name: ASTRAFLOW_ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: astraflow-admin-secrets
                  key: ASTRAFLOW_ADMIN_API_KEY
            - name: ASTRAFLOW_ADMIN_UI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: astraflow-admin-secrets
                  key: ASTRAFLOW_ADMIN_UI_USERNAME
            - name: ASTRAFLOW_ADMIN_UI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: astraflow-admin-secrets
                  key: ASTRAFLOW_ADMIN_UI_PASSWORD
          readinessProbe:
            httpGet:
              path: /astraflow-admin/api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /astraflow-admin/api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      terminationGracePeriodSeconds: 20
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: astraflow-admin-console
  namespace: astraflow-admin
  labels:
    app.kubernetes.io/name: astraflow-admin-console
    app.kubernetes.io/part-of: astraflow
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: astraflow-admin-console
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: astraflow-admin-console
  namespace: astraflow-admin
  labels:
    app.kubernetes.io/name: astraflow-admin-console
    app.kubernetes.io/part-of: astraflow
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public-gateway
      namespace: gateway-infra
      sectionName: https
  hostnames:
    - astraflow-desktop.modelverse.cn
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /astraflow-admin
      backendRefs:
        - group: ""
          kind: Service
          name: astraflow-admin-console
          port: 80
          weight: 1
