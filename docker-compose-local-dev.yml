name: astraflow-local-dev

services:
  postgres:
    image: postgres:17-alpine
    container_name: astraflow-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: astraflow
      POSTGRES_USER: astraflow
      POSTGRES_PASSWORD: astraflow
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - astraflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astraflow -d astraflow"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  astraflow_postgres_data:
