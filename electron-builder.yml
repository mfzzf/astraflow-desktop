appId: cn.ucloud.astraflow.desktop
productName: 优云智算
copyright: Copyright © 2026 UCloud

directories:
  app: dist/electron-app
  output: dist/electron
  buildResources: public/icon

# Maximum compression costs substantially more CPU and memory while producing
# nearly the same artifact size. Normal compression is safer on small runners.
compression: normal
electronLanguages:
  - en-US
  - zh-CN
# The afterPack hook rebuilds app.asar after materializing aliases and native
# modules, preserving the existing runtime deduplication.
asar: true
npmRebuild: false
buildDependenciesFromSource: true
afterPack: scripts/copy-electron-node-modules.cjs

files:
  - "**/*"
  - "!**/.next/cache/**"
  - "!**/*.map"
  - "!**/*.tsbuildinfo"

extraMetadata:
  main: electron/main.cjs

mac:
  category: public.app-category.productivity
  entitlements: electron/entitlements.mac.plist
  entitlementsInherit: electron/entitlements.mac.inherit.plist
  extendInfo:
    NSMicrophoneUsageDescription: 优云智算仅在录制语音提示时使用麦克风。
  # Keep the pre-generated ICNS so Finder's 16/32px list icons are preserved.
  # electron-builder 26's PNG converter corrupts the small raster entries.
  icon: public/compshare/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

dmg:
  sign: false

win:
  icon: public/compshare/icon.png
  executableName: compshare
  requestedExecutionLevel: asInvoker
  signtoolOptions:
    signingHashAlgorithms:
      - sha256
    rfc3161TimeStampServer: "http://timestamp.acs.microsoft.com"
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  # Keep electron-builder's differential-aware 7z package and the matching
  # Nsis7z extractor. `useZip: true` only changes the extractor while
  # differential packages remain 7z, producing an installer that cannot open
  # its embedded application archive.
  include: packaging/windows/installer.nsh
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true

linux:
  icon: public/compshare/icon.png
  category: Utility
  executableName: astraflow
  maintainer: UCloud <support@ucloud.cn>
  syncDesktopName: true
  target:
    - target: AppImage
      arch:
        - x64
        - arm64

artifactName: CompShare-${version}-${os}-${arch}.${ext}
publish:
  provider: generic
  url: ${env.ASTRAFLOW_RELEASE_BASE_URL}
