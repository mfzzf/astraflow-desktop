appId: cn.ucloud.astraflow.desktop
productName: AstraFlow
copyright: Copyright © 2026 UCloud

directories:
  app: dist/electron-app
  output: dist/electron
  buildResources: public/icon

compression: maximum
electronLanguages:
  - en-US
  - zh-CN
asar: false
npmRebuild: false
buildDependenciesFromSource: true
afterPack: scripts/copy-electron-node-modules.cjs

files:
  - "**/*"
  - "!**/.next/cache/**"
  - "!**/*.map"
  - "!**/*.tsbuildinfo"

extraMetadata:
  main: electron/main.cjs

mac:
  category: public.app-category.productivity
  icon: public/icon/icon.svg
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

dmg:
  sign: false

win:
  icon: public/icon/icon.svg
  requestedExecutionLevel: asInvoker
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true

linux:
  icon: public/icon/icon.svg
  category: Utility
  executableName: astraflow
  maintainer: UCloud <support@ucloud.cn>
  syncDesktopName: true
  target:
    - target: AppImage
      arch:
        - x64

artifactName: ${productName}-${version}-${os}-${arch}.${ext}
publish:
  provider: github
  owner: mfzzf
  repo: astraflow-desktop
  releaseType: release
